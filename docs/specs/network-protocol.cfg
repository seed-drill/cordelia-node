\* TLC Configuration for NetworkProtocol.tla
\*
\* Default: small model (2 personal, 1 bootnode, 1 relay, 2 channels, 2 items)
\* Increase for deeper verification at cost of state space explosion.
\*
\* Run: tlc NetworkProtocol.tla -config NetworkProtocol.cfg -workers auto

CONSTANTS
    MaxPersonal = 2
    MaxBootnode = 1
    MaxRelay    = 1
    MaxChannels = 2
    MaxItems    = 2

\* ---- Safety properties (invariants, checked at every state) ----
INVARIANT
    Safety

\* ---- Liveness properties (temporal, checked on FairSpec) ----
SPECIFICATION FairSpec

PROPERTY
    Delivery
    PullDelivery
    BootstrapCompletion
    \* Convergence requires Partition/Heal actions -- tested separately
