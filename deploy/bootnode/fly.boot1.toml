# Fly.io config for boot1.cordelia.seeddrill.ai
# Deploy: fly deploy --config deploy/bootnode/fly.boot1.toml

app = "cordelia-boot1"
primary_region = "lhr"  # London

[build]
  dockerfile = "deploy/bootnode/Dockerfile"

[env]
  CORDELIA_DATA_DIR = "/data/cordelia"

[[services]]
  internal_port = 9474
  protocol = "udp"

  [[services.ports]]
    port = 9474

[[services]]
  internal_port = 9473
  protocol = "tcp"

  [[services.ports]]
    port = 9473

[mounts]
  source = "cordelia_data"
  destination = "/data/cordelia"
