# S2 relay mesh: R=50 with sparse connectivity (hot_max=20).
# Tests multi-hop relay propagation. Mesh will be partial.

[topology]
name = "s2-r50-sparse"
relays = 50
personal_per_zone = 1
bootnodes = 2

[governor]
relay_hot_max = 20          # Sparse: multi-hop required
personal_hot_max = 2
tick_interval_secs = 2
warm_tenure_secs = 300

[experiment]
channel_name = "test-channel"
subscribe_all = true

[[experiment.phases]]
type = "wait_mesh"
target = 19                 # hot_max - 1 (partial mesh)
target_fraction = 0.9       # 90% of relays at target
timeout_secs = 300

[[experiment.phases]]
type = "publish"
publishers = ["p1", "p11", "p21", "p31", "p41"]
items_per_publisher = 3
item_size_bytes = 256

[[experiment.phases]]
type = "wait_delivery"
target_items = 15
target_nodes = "personal"
target_fraction = 1.0
timeout_secs = 240          # Longer: multi-hop propagation

[collection]
poll_interval_secs = 3
metrics = ["peers_hot", "peers_warm", "items_stored"]
