# T5: Partition/Heal (2P + 2R + 1B)
# Networks: internet, home-1, home-2 (zone-based model)
# B1: internet only. R1: internet + home-1. R2: internet + home-2.
# P1: home-1 only, P2: home-2 only
#
# Purpose: Network partition splits topology. Items delivered after heal.
# B1 is internet-only; P1/P2 bootstrap via their local relay.
# Partition: iptables R1 <-> R2 on internet (172.28.0.20 <-> 172.28.0.21)
# Properties tested: P6 (Convergence)
#
# Spec: cordelia-node/docs/specs/topology-e2e.md §3.6

name: t5-partition-heal

services:
  b1:
    image: ${CORDELIA_IMAGE:-cordelia-test:latest}
    container_name: t5-b1
    hostname: b1
    cap_add: [NET_ADMIN]
    environment:
      - NODE_NAME=b1
      - CORDELIA_DATA_DIR=/data/cordelia
    volumes:
      - ../configs/t5/b1.toml:/config/config.toml:ro
      - ../entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      internet:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9473/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 15s

  r1:
    image: ${CORDELIA_IMAGE:-cordelia-test:latest}
    container_name: t5-r1
    hostname: r1
    cap_add: [NET_ADMIN]
    environment:
      - NODE_NAME=r1
      - CORDELIA_DATA_DIR=/data/cordelia
    volumes:
      - ../configs/t5/r1.toml:/config/config.toml:ro
      - ../entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      internet:
        ipv4_address: 172.28.0.20
      home-1:
        ipv4_address: 172.28.1.20
    depends_on:
      b1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9473/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 15s

  r2:
    image: ${CORDELIA_IMAGE:-cordelia-test:latest}
    container_name: t5-r2
    hostname: r2
    cap_add: [NET_ADMIN]
    environment:
      - NODE_NAME=r2
      - CORDELIA_DATA_DIR=/data/cordelia
    volumes:
      - ../configs/t5/r2.toml:/config/config.toml:ro
      - ../entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      internet:
        ipv4_address: 172.28.0.21
      home-2:
        ipv4_address: 172.28.2.20
    depends_on:
      b1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9473/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 15s

  p1:
    image: ${CORDELIA_IMAGE:-cordelia-test:latest}
    container_name: t5-p1
    hostname: p1
    cap_add: [NET_ADMIN]
    environment:
      - NODE_NAME=p1
      - CORDELIA_DATA_DIR=/data/cordelia
    volumes:
      - ../configs/t5/p1.toml:/config/config.toml:ro
      - ../entrypoint.sh:/entrypoint.sh:ro
      - ../keys:/data/cordelia/channel-keys
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      home-1:
        ipv4_address: 172.28.1.30
    depends_on:
      r1:
        condition: service_healthy

  p2:
    image: ${CORDELIA_IMAGE:-cordelia-test:latest}
    container_name: t5-p2
    hostname: p2
    cap_add: [NET_ADMIN]
    environment:
      - NODE_NAME=p2
      - CORDELIA_DATA_DIR=/data/cordelia
    volumes:
      - ../configs/t5/p2.toml:/config/config.toml:ro
      - ../entrypoint.sh:/entrypoint.sh:ro
      - ../keys:/data/cordelia/channel-keys
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      home-2:
        ipv4_address: 172.28.2.30
    depends_on:
      r2:
        condition: service_healthy

networks:
  internet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
  home-1:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.1.0/24
  home-2:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.2.0/24
