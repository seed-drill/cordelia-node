# T7: Channel Isolation (3P + 1R + 1B)
# Networks: internet, home-1, home-2, home-3 (zone-based model)
# B1/R1: multi-homed (all networks)
# P1: home-1 only, P2: home-2 only, P3: home-3 only
#
# Purpose: Items for ch-alpha never appear on nodes subscribed only to ch-beta.
# Each personal node is zone-isolated; all traffic flows through R1.
# Properties tested: P3 (Channel isolation), P4 (Role isolation)
#
# Spec: cordelia-node/docs/specs/topology-e2e.md §3.8

name: t7-channel-isolation

services:
  b1:
    image: ${CORDELIA_IMAGE:-cordelia-test:latest}
    container_name: t7-b1
    hostname: b1
    cap_add: [NET_ADMIN]
    environment:
      - NODE_NAME=b1
      - CORDELIA_DATA_DIR=/data/cordelia
    volumes:
      - ../configs/t7/b1.toml:/config/config.toml:ro
      - ../entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      internet:
        ipv4_address: 172.28.0.10
      home-1:
        ipv4_address: 172.28.1.10
      home-2:
        ipv4_address: 172.28.2.10
      home-3:
        ipv4_address: 172.28.3.10
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9473/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 15s

  r1:
    image: ${CORDELIA_IMAGE:-cordelia-test:latest}
    container_name: t7-r1
    hostname: r1
    cap_add: [NET_ADMIN]
    environment:
      - NODE_NAME=r1
      - CORDELIA_DATA_DIR=/data/cordelia
    volumes:
      - ../configs/t7/r1.toml:/config/config.toml:ro
      - ../entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      internet:
        ipv4_address: 172.28.0.20
      home-1:
        ipv4_address: 172.28.1.20
      home-2:
        ipv4_address: 172.28.2.20
      home-3:
        ipv4_address: 172.28.3.20
    depends_on:
      b1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9473/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 15s

  p1:
    image: ${CORDELIA_IMAGE:-cordelia-test:latest}
    container_name: t7-p1
    hostname: p1
    cap_add: [NET_ADMIN]
    environment:
      - NODE_NAME=p1
      - CORDELIA_DATA_DIR=/data/cordelia
    volumes:
      - ../configs/t7/p1.toml:/config/config.toml:ro
      - ../entrypoint.sh:/entrypoint.sh:ro
      - ../keys:/data/cordelia/channel-keys
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      home-1:
        ipv4_address: 172.28.1.30
    depends_on:
      b1:
        condition: service_healthy

  p2:
    image: ${CORDELIA_IMAGE:-cordelia-test:latest}
    container_name: t7-p2
    hostname: p2
    cap_add: [NET_ADMIN]
    environment:
      - NODE_NAME=p2
      - CORDELIA_DATA_DIR=/data/cordelia
    volumes:
      - ../configs/t7/p2.toml:/config/config.toml:ro
      - ../entrypoint.sh:/entrypoint.sh:ro
      - ../keys:/data/cordelia/channel-keys
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      home-2:
        ipv4_address: 172.28.2.30
    depends_on:
      b1:
        condition: service_healthy

  p3:
    image: ${CORDELIA_IMAGE:-cordelia-test:latest}
    container_name: t7-p3
    hostname: p3
    cap_add: [NET_ADMIN]
    environment:
      - NODE_NAME=p3
      - CORDELIA_DATA_DIR=/data/cordelia
    volumes:
      - ../configs/t7/p3.toml:/config/config.toml:ro
      - ../entrypoint.sh:/entrypoint.sh:ro
      - ../keys:/data/cordelia/channel-keys
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      home-3:
        ipv4_address: 172.28.3.30
    depends_on:
      b1:
        condition: service_healthy

networks:
  internet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
  home-1:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.1.0/24
  home-2:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.2.0/24
  home-3:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.3.0/24
