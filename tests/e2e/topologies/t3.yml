# T3: Pull-Only (2P + 1B + 1R)
# Purpose: pull_only node receives items exclusively via Item-Sync.
# Properties tested: P2 (Pull delivery), P8 (Push silence)
#
# Spec: seed-drill/specs/topology-e2e.md §3.4

name: t3-pull-only

services:
  b1:
    image: ${CORDELIA_IMAGE:-cordelia-test:latest}
    container_name: t3-b1
    hostname: b1
    cap_add: [NET_ADMIN]
    environment:
      - NODE_NAME=b1
      - CORDELIA_DATA_DIR=/data/cordelia
    volumes:
      - ../configs/t3/b1.toml:/config/config.toml:ro
      - ../entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      cordelia-net:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9473/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 15s

  r1:
    image: ${CORDELIA_IMAGE:-cordelia-test:latest}
    container_name: t3-r1
    hostname: r1
    cap_add: [NET_ADMIN]
    environment:
      - NODE_NAME=r1
      - CORDELIA_DATA_DIR=/data/cordelia
    volumes:
      - ../configs/t3/r1.toml:/config/config.toml:ro
      - ../entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      cordelia-net:
        ipv4_address: 172.28.0.20
    depends_on:
      b1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9473/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 15s

  p1:
    image: ${CORDELIA_IMAGE:-cordelia-test:latest}
    container_name: t3-p1
    hostname: p1
    cap_add: [NET_ADMIN]
    environment:
      - NODE_NAME=p1
      - CORDELIA_DATA_DIR=/data/cordelia
    volumes:
      - ../configs/t3/p1.toml:/config/config.toml:ro
      - ../entrypoint.sh:/entrypoint.sh:ro
      - ../keys:/data/cordelia/channel-keys
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      cordelia-net:
        ipv4_address: 172.28.0.30
    depends_on:
      b1:
        condition: service_healthy

  p2:
    image: ${CORDELIA_IMAGE:-cordelia-test:latest}
    container_name: t3-p2
    hostname: p2
    cap_add: [NET_ADMIN]
    environment:
      - NODE_NAME=p2
      - CORDELIA_DATA_DIR=/data/cordelia
    volumes:
      - ../configs/t3/p2.toml:/config/config.toml:ro
      - ../entrypoint.sh:/entrypoint.sh:ro
      - ../keys:/data/cordelia/channel-keys
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      cordelia-net:
        ipv4_address: 172.28.0.31
    depends_on:
      b1:
        condition: service_healthy

networks:
  cordelia-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
